<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Xora</title>
    <link rel="icon" type="image/png" href="/logo.gif">


    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #a0a0b0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .bg {
            position: fixed; inset: 0;
            background-image:
                radial-gradient(ellipse 600px 400px at 20% 15%, rgba(144,144,144,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 500px 350px at 80% 75%, rgba(144,144,144,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 50% 40%, rgba(144,144,144,0.05) 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.035) 49px, rgba(255,255,255,0.035) 50px),
                repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.035) 49px, rgba(255,255,255,0.035) 50px);
            z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            background: rgba(12, 12, 18, 0.92);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 48px 40px;
            text-align: center;
            backdrop-filter: blur(16px);
        }
        .brand-logo {
            width: 64px; height: 64px; object-fit: contain;
            display: block; margin: 0 auto 18px;
        }
        .card h1 {
            font-size: 22px; font-weight: 700; color: #fff;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 14px; color: #555568; margin-bottom: 32px;
            line-height: 1.5;
        }
        .discord-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px;
            background: #5865F2;
            color: #fff; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, transform 0.1s;
            text-decoration: none;
        }
        .discord-btn:hover { background: #4752c4; transform: translateY(-1px); }
        .discord-btn:active { transform: translateY(0); }
        .discord-btn svg { width: 22px; height: 22px; fill: #fff; }

        .footer-text {
            margin-top: 24px; font-size: 11px; color: #333345;
        }
    </style>
</head>
<body>
<div class="bg"></div>

<div class="card">
    <img src="/logo.gif" alt="Xora" class="brand-logo">
    <h1>Sign in</h1>
    <p>Access your license and download the loader.</p>

    <a href="/auth/discord" class="discord-btn">
        <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
        Sign in with Discord
    </a>

    <div class="footer-text">By signing in you agree to our Terms of Service</div>
</div>
</body>
</html>
